env:
  APP_NAME: Smail

name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-pack:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            executable: SmailAvalonia.exe
          - os: ubuntu-latest
            rid: linux-x64
            executable: SmailAvalonia
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0

      - name: Dotnet Publish
        shell: bash
        run: |
          dotnet publish ./SmailAvalonia/SmailAvalonia.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishReadyToRun=true \
            -o ./publish_output
          
          dotnet publish ./SmailAPI/SmailAPI.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained false \
            -o ./publish_output

      - name: Grant executing rights (Linux only)
        if: matrix.rid == 'linux-x64'
        shell: bash
        run: |
          chmod +x ./publish_output/CALibs/Linux_86x_64/smsgate-ca
          # Verify it's set
          ls -l ./publish_output/CALibs/Linux_86x_64/smsgate-ca

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Velopack Pack
        shell: bash
        run: |
          vpk pack -u ${{ env.APP_NAME }} \
                   -v ${GITHUB_REF_NAME#v} \
                   -p ./publish_output \
                   -e ${{ matrix.executable }} \
                   -o ./velopack_release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.rid }}
          path: ./velopack_release/*

  upload-to-github:
    needs: build-and-pack
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all_packages
          # merge-multiple: false (This is the default, keeps folders separate)

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Velopack Upload
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Upload Windows assets
          vpk upload github \
                   --repoUrl "https://github.com/${{ github.repository }}" \
                   --token "$GH_TOKEN" \
                   --tag ${{ github.ref_name }} \
                   --publish \
                   --merge \
                   --channel win \
                   --outputDir ./all_packages/release-win-x64

          # Upload Linux assets
          vpk upload github \
                   --repoUrl "https://github.com/${{ github.repository }}" \
                   --token "$GH_TOKEN" \
                   --tag ${{ github.ref_name }} \
                   --publish \
                   --merge \
                   --channel linux \
                   --outputDir ./all_packages/release-linux-x64